        border-radius: 20px;
        border: 2px solid #00d4ff;
        box-shadow: 0 0 40px #00d4ff40;
        position: relative;
        overflow: hidden;
      }
      .container::before {
        content: '';
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: linear-gradient(135deg, #00d4ff20, #5ae4ff10);

        z-index: -1;

        font-size: 24px;
        font-weight: 700;
        text-shadow: 0 2px 8px #00d4ff40;

        line-height: 1.7;
        color: rgb(226 231 255);
        margin: 12px 0;
        font-size: 15px;

        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin: 16px 0;
        padding: 16px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 12px;
        border: 1px solid #00d4ff20;
      }
      .meta-item {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .meta-label {
        font-size: 11px;
        text-transform: uppercase;
        color: #5ae4ff;
        letter-spacing: 0.5px;
        font-weight: 600;
      }
      .meta-value {
        font-size: 16px;
        color: #ffd700;
        font-weight: 700;
      }
      a {
        color: #ffd700;
        text-decoration: none;
        font-weight: 600;

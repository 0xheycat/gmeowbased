# User Points & Streaks (from Core contract)
# Phase 7: Enhanced with tip tracking and milestones
type User @entity {
  id: ID! # wallet address (lowercase)
  pointsBalance: BigInt! # Current spendable balance (matches contract pointsBalance)
  totalEarnedFromGMs: BigInt! # Cumulative earned from GM events only
  currentStreak: Int!
  lastGMTimestamp: BigInt!
  lifetimeGMs: Int!
  badges: [BadgeMint!] @derivedFrom(field: "user")
  guilds: [GuildMember!] @derivedFrom(field: "user")
  gmEvents: [GMEvent!] @derivedFrom(field: "user")
  
  # Phase 7: Tip tracking
  tipsGiven: [TipEvent!] @derivedFrom(field: "from")
  tipsReceived: [TipEvent!] @derivedFrom(field: "to")
  totalTipsGiven: BigInt!
  totalTipsReceived: BigInt!
  
  # Phase 7: Milestones
  milestones: [ViralMilestone!] @derivedFrom(field: "user")
  milestoneCount: Int!
  
  createdAt: DateTime!
  updatedAt: DateTime!
}

# GM Events (from Core contract)
type GMEvent @entity {
  id: ID! # txHash-logIndex
  user: User!
  timestamp: BigInt!
  pointsAwarded: BigInt!
  streakDay: Int!
  blockNumber: Int! @index
  txHash: String! @index
}

# Leaderboard (pre-computed rankings)
type LeaderboardEntry @entity {
  id: ID! # wallet address (lowercase)
  user: User!
  rank: Int! @index
  totalPoints: BigInt!
  weeklyPoints: BigInt!
  monthlyPoints: BigInt!
  updatedAt: DateTime!
}

# Guild System (from Guild contract)
# Phase 1.2: Enhanced with getGuildInfo() contract reads (name, level, isActive)
type Guild @entity {
  id: ID! # guild ID from contract
  name: String! # Guild name from contract
  owner: String! @index # Guild leader address
  createdAt: BigInt!
  totalMembers: Int!
  level: Int! # Guild level (0-255 from contract uint8)
  isActive: Boolean! # Guild active status from contract
  treasuryPoints: BigInt! # Guild treasury balance from contract
  members: [GuildMember!] @derivedFrom(field: "guild")
  events: [GuildEvent!] @derivedFrom(field: "guild")
}

type GuildMember @entity {
  id: ID! # guildId-memberAddress
  guild: Guild!
  user: User!
  joinedAt: BigInt!
  role: String! # owner, officer, member
  pointsContributed: BigInt!
  isActive: Boolean!
}

type GuildEvent @entity {
  id: ID! # txHash-logIndex
  guild: Guild!
  eventType: String! # CREATED, JOINED, LEFT, DEPOSIT, POINTS_AWARDED
  user: String! @index
  amount: BigInt # for deposits/points
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

# Guild Points Deposited Event (Layer 2: Contract Event Structure)
# Source: event GuildPointsDeposited(uint256 guildId, address from, uint256 amount)
# Naming: Exact contract field names (camelCase - contract is source of truth)
type GuildPointsDepositedEvent @entity {
  id: ID! # txHash-logIndex
  guildId: String! @index # Contract field name (uint256 → String for DB)
  from: String! @index # Contract field name (address)
  amount: BigInt! # Contract field name (uint256 → BigInt)
  
  # Standard event metadata
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

# Guild Level Up Event (Layer 2: Contract Event Structure)
# Source: event GuildLevelUp(uint256 guildId, uint8 newLevel)
# Naming: Exact contract field names (camelCase - contract is source of truth)
# Note: Event emitted automatically when guildTreasuryPoints() crosses level thresholds
type GuildLevelUpEvent @entity {
  id: ID! # txHash-logIndex
  guildId: String! @index # Contract field name (uint256 → String for DB)
  newLevel: Int! # Contract field name (uint8 → Int)
  
  # Standard event metadata
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

# Badge/NFT System (from Badge contract)
type BadgeMint @entity {
  id: ID! # txHash-logIndex
  tokenId: BigInt!
  user: User!
  badgeType: String!
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

# NFT Mints and Transfers
# Updated: Phase 1 Day 2 - Added nftType and metadataURI fields
type NFTMint @entity {
  id: ID! # txHash-logIndex
  tokenId: BigInt!
  to: String! @index
  nftType: String! @index       # Badge type (legendary_quest, streak_champion, etc.)
  metadataURI: String!          # IPFS or HTTP URI for metadata
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

type NFTTransfer @entity {
  id: ID! # txHash-logIndex
  tokenId: BigInt!
  from: String! @index
  to: String! @index
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

# Referral System (from Referral contract)
type ReferralCode @entity {
  id: ID! # referral code (string)
  owner: String! @index
  createdAt: BigInt!
  totalUses: Int!
  totalRewards: BigInt!
  referrals: [ReferralUse!] @derivedFrom(field: "code")
}

type ReferralUse @entity {
  id: ID! # txHash-logIndex
  code: ReferralCode!
  referrer: String! @index
  referee: String! @index
  reward: BigInt!
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

# Phase 8.4: Referral Chain Tracking
type ReferrerSet @entity {
  id: ID! # txHash-logIndex
  user: String! @index # the user who set their referrer
  referrer: String! @index # the referrer address
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

# Daily Aggregations (for analytics)
type DailyStats @entity {
  id: ID! # date-YYYY-MM-DD
  date: String! @index
  totalGMs: Int!
  uniqueUsers: Int!
  dailyPointsAwarded: BigInt! # Daily aggregate of pointsAwarded from events
  newGuilds: Int!
  badgesMinted: Int!
}

# Phase 7: Tip Events (for tip analytics)
type TipEvent @entity {
  id: ID! # txHash-logIndex
  from: User!
  to: User!
  amount: BigInt!
  timestamp: DateTime!
  blockNumber: Int! @index
  txHash: String! @index
  
  # Computed analytics
  isFirstTip: Boolean!
  dailyTipCount: Int!
}

# Phase 7: Viral Milestones (for achievement tracking)
type ViralMilestone @entity {
  id: ID! # userId-milestoneType-timestamp
  user: User!
  milestoneType: String! @index # "first_gm", "7_day_streak", "100_tips_received", etc.
  value: BigInt!
  timestamp: DateTime!
  castHash: String
  notificationSent: Boolean!
  
  # Context
  previousValue: BigInt
  requiredValue: BigInt!
  category: String! @index # "gm", "tips", "badges", "guilds"
}

# Phase 7: Daily User Stats (pre-computed per-user metrics)
type DailyUserStats @entity {
  id: ID! # userId-YYYY-MM-DD
  user: User!
  date: String! @index
  
  # Daily metrics
  gmsCompleted: Int!
  tipsGiven: BigInt!
  tipsReceived: BigInt!
  pointsEarned: BigInt!
  guildsJoined: Int!
  badgesMinted: Int!
  
  # Computed
  streakDay: Int!
  rank: Int
}

# Phase 7: Hourly Leaderboard Snapshots (for historical tracking)
type HourlyLeaderboardSnapshot @entity {
  id: ID! # YYYY-MM-DD-HH
  timestamp: DateTime!
  
  # Snapshot metadata
  totalUsers: Int!
  averagePoints: BigInt!
  medianPoints: BigInt!
  
  # Top 100 entries (JSON serialized for efficient storage)
  entriesJSON: String! # [{rank, userId, totalPoints}, ...]
}

# Phase 8: Quest System (from Core/Guild/Referral contracts)
type Quest @entity {
  id: ID! # questId from contract
  questType: String! @index # "social", "onchain", "erc20", "guild"
  creator: String! @index # wallet address
  contractAddress: String! @index # which contract (core/guild/referral)
  
  # Rewards
  rewardPoints: BigInt!
  rewardToken: String # ERC20 token address (if ERC20 quest)
  rewardTokenAmount: BigInt # ERC20 token amount per completion
  
  # Onchain quest specifics
  onchainType: Int # 0=ERC20_HOLD, 1=ERC721_HOLD, 2=CONTRACT_CALL
  targetAsset: String # target contract address for onchain validation
  targetAmount: BigInt # required amount/tokenId
  targetData: String # calldata for CONTRACT_CALL type
  
  # Lifecycle
  createdAt: DateTime!
  createdBlock: Int! @index
  closedAt: DateTime
  closedBlock: Int
  isActive: Boolean! @index
  
  # Stats
  totalCompletions: Int!
  pointsAwarded: BigInt! # Total points awarded from QuestCompleted events
  totalTokensAwarded: BigInt!
  
  # Relations
  completions: [QuestCompletion!] @derivedFrom(field: "quest")
  
  # Metadata
  txHash: String! @index
}

type QuestCompletion @entity {
  id: ID! # txHash-logIndex
  quest: Quest!
  user: User!
  
  # Rewards received
  pointsAwarded: BigInt!
  tokenReward: BigInt # ERC20 reward amount (if applicable)
  rewardToken: String # ERC20 token address (if applicable)
  
  # User context
  fid: BigInt! # Farcaster ID
  
  # Metadata
  timestamp: DateTime!
  blockNumber: Int! @index
  txHash: String! @index
}

# Phase 8.2: Points & Treasury System
type PointsTransaction @entity {
  id: ID! # txHash-logIndex
  transactionType: String! @index # "DEPOSIT", "WITHDRAW"
  user: String! @index # wallet address
  amount: BigInt!
  
  # Context
  from: String # source address (for deposits)
  to: String # destination address (for withdrawals)
  
  # Metadata
  timestamp: DateTime!
  blockNumber: Int! @index
  txHash: String! @index
}

type TreasuryOperation @entity {
  id: ID! # txHash-logIndex
  operationType: String! @index # "ESCROW_DEPOSIT", "PAYOUT", "REFUND"
  token: String! @index # ERC20 token address
  amount: BigInt!
  
  # Participants
  from: String! @index # depositor/payer
  to: String # recipient (for payouts/refunds)
  questId: BigInt # associated quest (if applicable)
  
  # Metadata
  timestamp: DateTime!
  blockNumber: Int! @index
  txHash: String! @index
}

# Phase 8.3: Badge Staking System
type BadgeStake @entity {
  id: ID! # txHash-logIndex (for stake/unstake events)
  user: String! @index # wallet address
  badgeId: BigInt! # NFT token ID
  stakeType: String! @index # "STAKED", "UNSTAKED"
  
  # Staking details
  stakedAt: DateTime # when staked (null if unstaked)
  unstakedAt: DateTime # when unstaked (null if still staked)
  isActive: Boolean! @index # true if currently staked
  
  # Rewards tracking
  rewardsEarned: BigInt # accumulated rewards while staked
  lastRewardClaim: DateTime # last time rewards were calculated
  
  # Power badge info (if applicable)
  isPowerBadge: Boolean! # true if this badge grants power
  powerMultiplier: Int # bonus multiplier (1-100)
  
  # Metadata
  blockNumber: Int! @index
  txHash: String! @index
}

# Phase 8.3.1: Power Badge Tracking
type PowerBadge @entity {
  id: ID! # fid (Farcaster ID)
  fid: BigInt! @index
  isPowerBadge: Boolean! # power status
  setBy: String! # admin who set this
  
  # Metadata
  timestamp: DateTime!
  blockNumber: Int! @index
  txHash: String! @index
}

# User XP & Streaks (from Core contract)
# Phase 7: Enhanced with tip tracking and milestones
type User @entity {
  id: ID! # wallet address (lowercase)
  totalXP: BigInt!
  currentStreak: Int!
  lastGMTimestamp: BigInt!
  lifetimeGMs: Int!
  badges: [BadgeMint!] @derivedFrom(field: "user")
  guilds: [GuildMember!] @derivedFrom(field: "user")
  gmEvents: [GMEvent!] @derivedFrom(field: "user")
  
  # Phase 7: Tip tracking
  tipsGiven: [TipEvent!] @derivedFrom(field: "from")
  tipsReceived: [TipEvent!] @derivedFrom(field: "to")
  totalTipsGiven: BigInt!
  totalTipsReceived: BigInt!
  
  # Phase 7: Milestones
  milestones: [ViralMilestone!] @derivedFrom(field: "user")
  milestoneCount: Int!
  
  createdAt: DateTime!
  updatedAt: DateTime!
}

# GM Events (from Core contract)
type GMEvent @entity {
  id: ID! # txHash-logIndex
  user: User!
  timestamp: BigInt!
  xpAwarded: BigInt!
  streakDay: Int!
  blockNumber: Int! @index
  txHash: String! @index
}

# Leaderboard (pre-computed rankings)
type LeaderboardEntry @entity {
  id: ID! # wallet address (lowercase)
  user: User!
  rank: Int! @index
  totalPoints: BigInt!
  weeklyPoints: BigInt!
  monthlyPoints: BigInt!
  updatedAt: DateTime!
}

# Guild System (from Guild contract)
type Guild @entity {
  id: ID! # guild ID from contract
  owner: String! @index
  createdAt: BigInt!
  totalMembers: Int!
  totalPoints: BigInt!
  members: [GuildMember!] @derivedFrom(field: "guild")
  events: [GuildEvent!] @derivedFrom(field: "guild")
}

type GuildMember @entity {
  id: ID! # guildId-memberAddress
  guild: Guild!
  user: User!
  joinedAt: BigInt!
  role: String! # owner, officer, member
  pointsContributed: BigInt!
  isActive: Boolean!
}

type GuildEvent @entity {
  id: ID! # txHash-logIndex
  guild: Guild!
  eventType: String! # CREATED, JOINED, LEFT, DEPOSIT, POINTS_AWARDED
  user: String! @index
  amount: BigInt # for deposits/points
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

# Badge/NFT System (from Badge contract)
type BadgeMint @entity {
  id: ID! # txHash-logIndex
  tokenId: BigInt!
  user: User!
  badgeType: String!
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

# NFT Mints and Transfers
# Updated: Phase 1 Day 2 - Added nftType and metadataURI fields
type NFTMint @entity {
  id: ID! # txHash-logIndex
  tokenId: BigInt!
  to: String! @index
  nftType: String! @index       # Badge type (legendary_quest, streak_champion, etc.)
  metadataURI: String!          # IPFS or HTTP URI for metadata
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

type NFTTransfer @entity {
  id: ID! # txHash-logIndex
  tokenId: BigInt!
  from: String! @index
  to: String! @index
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

# Referral System (from Referral contract)
type ReferralCode @entity {
  id: ID! # referral code (string)
  owner: String! @index
  createdAt: BigInt!
  totalUses: Int!
  totalRewards: BigInt!
  referrals: [ReferralUse!] @derivedFrom(field: "code")
}

type ReferralUse @entity {
  id: ID! # txHash-logIndex
  code: ReferralCode!
  referrer: String! @index
  referee: String! @index
  reward: BigInt!
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

# Daily Aggregations (for analytics)
type DailyStats @entity {
  id: ID! # date-YYYY-MM-DD
  date: String! @index
  totalGMs: Int!
  uniqueUsers: Int!
  totalXPAwarded: BigInt!
  newGuilds: Int!
  badgesMinted: Int!
}

# Phase 7: Tip Events (for tip analytics)
type TipEvent @entity {
  id: ID! # txHash-logIndex
  from: User!
  to: User!
  amount: BigInt!
  timestamp: DateTime!
  blockNumber: Int! @index
  txHash: String! @index
  
  # Computed analytics
  isFirstTip: Boolean!
  dailyTipCount: Int!
}

# Phase 7: Viral Milestones (for achievement tracking)
type ViralMilestone @entity {
  id: ID! # userId-milestoneType-timestamp
  user: User!
  milestoneType: String! @index # "first_gm", "7_day_streak", "100_tips_received", etc.
  value: BigInt!
  timestamp: DateTime!
  castHash: String
  notificationSent: Boolean!
  
  # Context
  previousValue: BigInt
  requiredValue: BigInt!
  category: String! @index # "gm", "tips", "badges", "guilds"
}

# Phase 7: Daily User Stats (pre-computed per-user metrics)
type DailyUserStats @entity {
  id: ID! # userId-YYYY-MM-DD
  user: User!
  date: String! @index
  
  # Daily metrics
  gmsCompleted: Int!
  tipsGiven: BigInt!
  tipsReceived: BigInt!
  xpEarned: BigInt!
  guildsJoined: Int!
  badgesMinted: Int!
  
  # Computed
  streakDay: Int!
  rank: Int
}

# Phase 7: Hourly Leaderboard Snapshots (for historical tracking)
type HourlyLeaderboardSnapshot @entity {
  id: ID! # YYYY-MM-DD-HH
  timestamp: DateTime!
  
  # Snapshot metadata
  totalUsers: Int!
  averagePoints: BigInt!
  medianPoints: BigInt!
  
  # Top 100 entries (JSON serialized for efficient storage)
  entriesJSON: String! # [{rank, userId, totalPoints}, ...]
}

# User Points & Streaks (from Core contract)
# Phase 7: Enhanced with tip tracking and milestones
# Phase 3.2G (Jan 1, 2026): Enhanced with ScoringModule on-chain data
type User @entity {
  id: ID! # wallet address (lowercase)
  pointsBalance: BigInt! # Current spendable balance (matches contract pointsBalance)
  totalEarnedFromGMs: BigInt! # Cumulative earned from GM events only
  currentStreak: Int!
  lastGMTimestamp: BigInt!
  lifetimeGMs: Int!
  badges: [BadgeMint!] @derivedFrom(field: "user")
  guilds: [GuildMember!] @derivedFrom(field: "user")
  gmEvents: [GMEvent!] @derivedFrom(field: "user")
  
  # Phase 7: Tip tracking
  tipsGiven: [TipEvent!] @derivedFrom(field: "from")
  tipsReceived: [TipEvent!] @derivedFrom(field: "to")
  totalTipsGiven: BigInt!
  totalTipsReceived: BigInt!
  
  # Phase 7: Milestones
  milestones: [ViralMilestone!] @derivedFrom(field: "user")
  milestoneCount: Int!
  
  # Phase 3.2G: ScoringModule on-chain scoring data (from StatsUpdated events)
  level: Int! @index # User level (0-100+, from getUserStats)
  rankTier: Int! @index # Rank tier (0-11: Cadet to Cosmic Legend, from getUserStats)
  totalScore: BigInt! @index # Total score across all categories (from getUserStats)
  multiplier: Int! # Bonus multiplier from rank tier (100-500 = 1.0x-5.0x)
  
  # Phase 3.2G: Point breakdown (from getScoreBreakdown)
  gmPoints: BigInt! # Points from GM events
  viralPoints: BigInt! # Points from viral activities (tips, engagements)
  questPoints: BigInt! # Points from quest completions
  guildPoints: BigInt! # Points from guild activities
  referralPoints: BigInt! # Points from referrals
  
  # Phase 3.2G: Progression tracking (from getLevelProgress & getRankProgress)
  xpIntoLevel: BigInt! # XP earned in current level
  xpToNextLevel: BigInt! # XP required for next level
  pointsIntoTier: BigInt! # Points earned in current tier
  pointsToNextTier: BigInt! # Points required for next tier
  
  # Phase 3.2G: Historical tracking
  lastLevelUpAt: DateTime # Last time user leveled up
  lastRankUpAt: DateTime # Last time user ranked up
  totalLevelUps: Int! # Total number of level ups
  totalRankUps: Int! # Total number of rank ups
  
  # Phase 3.2G: Event relations
  statsUpdates: [StatsUpdatedEvent!] @derivedFrom(field: "user")
  levelUps: [LevelUpEvent!] @derivedFrom(field: "user")
  rankUps: [RankUpEvent!] @derivedFrom(field: "user")
  
  createdAt: DateTime!
  updatedAt: DateTime!
}

# GM Events (from Core contract)
type GMEvent @entity {
  id: ID! # txHash-logIndex
  user: User!
  timestamp: BigInt!
  pointsAwarded: BigInt!
  streakDay: Int!
  blockNumber: Int! @index
  txHash: String! @index
}

# Leaderboard (pre-computed rankings)
# Phase 3.2G: Enhanced with on-chain scoring data
type LeaderboardEntry @entity {
  id: ID! # wallet address (lowercase)
  user: User!
  
  # Rankings
  rank: Int! @index # Global rank position
  
  # Scores (from User entity)
  totalPoints: BigInt! # Total score (denormalized from User.totalScore)
  weeklyPoints: BigInt! # Points earned this week
  monthlyPoints: BigInt! # Points earned this month
  
  # Phase 3.2G: On-chain data (denormalized from User for faster queries)
  level: Int! # User level
  rankTier: Int! # Rank tier (0-11)
  multiplier: Int! # Bonus multiplier
  
  # Phase 3.2G: Rank change tracking
  previousRank: Int # Rank from last update (for delta calculation)
  rankChange: Int # Change in rank (negative = improved)
  
  updatedAt: DateTime!
}

# Guild System (from Guild contract)
# Phase 1.2: Enhanced with getGuildInfo() contract reads (name, level, isActive)
type Guild @entity {
  id: ID! # guild ID from contract
  name: String! # Guild name from contract
  owner: String! @index # Guild leader address
  createdAt: BigInt!
  totalMembers: Int!
  level: Int! # Guild level (0-255 from contract uint8)
  isActive: Boolean! # Guild active status from contract
  treasuryPoints: BigInt! # Guild treasury balance from contract
  members: [GuildMember!] @derivedFrom(field: "guild")
  events: [GuildEvent!] @derivedFrom(field: "guild")
}

type GuildMember @entity {
  id: ID! # guildId-memberAddress
  guild: Guild!
  user: User!
  joinedAt: BigInt!
  role: String! # owner, officer, member
  pointsContributed: BigInt!
  isActive: Boolean!
}

type GuildEvent @entity {
  id: ID! # txHash-logIndex
  guild: Guild!
  eventType: String! # CREATED, JOINED, LEFT, DEPOSIT, POINTS_AWARDED
  user: String! @index
  amount: BigInt # for deposits/points
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

# Guild Points Deposited Event (Layer 2: Contract Event Structure)
# Source: event GuildPointsDeposited(uint256 guildId, address from, uint256 amount)
# Naming: Exact contract field names (camelCase - contract is source of truth)
type GuildPointsDepositedEvent @entity {
  id: ID! # txHash-logIndex
  guildId: String! @index # Contract field name (uint256 → String for DB)
  from: String! @index # Contract field name (address)
  amount: BigInt! # Contract field name (uint256 → BigInt)
  
  # Standard event metadata
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

# Guild Level Up Event (Layer 2: Contract Event Structure)
# Source: event GuildLevelUp(uint256 guildId, uint8 newLevel)
# Naming: Exact contract field names (camelCase - contract is source of truth)
# Note: Event emitted automatically when guildTreasuryPoints() crosses level thresholds
type GuildLevelUpEvent @entity {
  id: ID! # txHash-logIndex
  guildId: String! @index # Contract field name (uint256 → String for DB)
  newLevel: Int! # Contract field name (uint8 → Int)
  
  # Standard event metadata
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

# Badge/NFT System (from Badge contract)
type BadgeMint @entity {
  id: ID! # txHash-logIndex
  tokenId: BigInt!
  user: User!
  badgeType: String!
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

# NFT Mints and Transfers
# Updated: Phase 1 Day 2 - Added nftType and metadataURI fields
type NFTMint @entity {
  id: ID! # txHash-logIndex
  tokenId: BigInt!
  to: String! @index
  nftType: String! @index       # Badge type (legendary_quest, streak_champion, etc.)
  metadataURI: String!          # IPFS or HTTP URI for metadata
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

type NFTTransfer @entity {
  id: ID! # txHash-logIndex
  tokenId: BigInt!
  from: String! @index
  to: String! @index
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

# Referral System (from Referral contract)
type ReferralCode @entity {
  id: ID! # referral code (string)
  owner: String! @index
  createdAt: BigInt!
  totalUses: Int!
  totalRewards: BigInt!
  referrals: [ReferralUse!] @derivedFrom(field: "code")
}

type ReferralUse @entity {
  id: ID! # txHash-logIndex
  code: ReferralCode!
  referrer: String! @index
  referee: String! @index
  reward: BigInt!
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

# Phase 8.4: Referral Chain Tracking
type ReferrerSet @entity {
  id: ID! # txHash-logIndex
  user: String! @index # the user who set their referrer
  referrer: String! @index # the referrer address
  timestamp: BigInt!
  blockNumber: Int! @index
  txHash: String! @index
}

# Daily Aggregations (for analytics)
type DailyStats @entity {
  id: ID! # date-YYYY-MM-DD
  date: String! @index
  totalGMs: Int!
  uniqueUsers: Int!
  dailyPointsAwarded: BigInt! # Daily aggregate of pointsAwarded from events
  newGuilds: Int!
  badgesMinted: Int!
}

# Phase 7: Tip Events (for tip analytics)
type TipEvent @entity {
  id: ID! # txHash-logIndex
  from: User!
  to: User!
  amount: BigInt!
  timestamp: DateTime!
  blockNumber: Int! @index
  txHash: String! @index
  
  # Computed analytics
  isFirstTip: Boolean!
  dailyTipCount: Int!
}

# Phase 7: Viral Milestones (for achievement tracking)
type ViralMilestone @entity {
  id: ID! # userId-milestoneType-timestamp
  user: User!
  milestoneType: String! @index # "first_gm", "7_day_streak", "100_tips_received", etc.
  value: BigInt!
  timestamp: DateTime!
  castHash: String
  notificationSent: Boolean!
  
  # Context
  previousValue: BigInt
  requiredValue: BigInt!
  category: String! @index # "gm", "tips", "badges", "guilds"
}

# Phase 7: Daily User Stats (pre-computed per-user metrics)
type DailyUserStats @entity {
  id: ID! # userId-YYYY-MM-DD
  user: User!
  date: String! @index
  
  # Daily metrics
  gmsCompleted: Int!
  tipsGiven: BigInt!
  tipsReceived: BigInt!
  pointsEarned: BigInt!
  guildsJoined: Int!
  badgesMinted: Int!
  
  # Computed
  streakDay: Int!
  rank: Int
}

# Phase 7: Hourly Leaderboard Snapshots (for historical tracking)
type HourlyLeaderboardSnapshot @entity {
  id: ID! # YYYY-MM-DD-HH
  timestamp: DateTime!
  
  # Snapshot metadata
  totalUsers: Int!
  averagePoints: BigInt!
  medianPoints: BigInt!
  
  # Top 100 entries (JSON serialized for efficient storage)
  entriesJSON: String! # [{rank, userId, totalPoints}, ...]
}

# Phase 8: Quest System (from Core/Guild/Referral contracts)
type Quest @entity {
  id: ID! # questId from contract
  questType: String! @index # "social", "onchain", "erc20", "guild"
  creator: String! @index # wallet address
  contractAddress: String! @index # which contract (core/guild/referral)
  
  # Rewards
  rewardPoints: BigInt!
  rewardToken: String # ERC20 token address (if ERC20 quest)
  rewardTokenAmount: BigInt # ERC20 token amount per completion
  
  # Onchain quest specifics
  onchainType: Int # 0=ERC20_HOLD, 1=ERC721_HOLD, 2=CONTRACT_CALL
  targetAsset: String # target contract address for onchain validation
  targetAmount: BigInt # required amount/tokenId
  targetData: String # calldata for CONTRACT_CALL type
  
  # Lifecycle
  createdAt: DateTime!
  createdBlock: Int! @index
  closedAt: DateTime
  closedBlock: Int
  isActive: Boolean! @index
  
  # Stats
  totalCompletions: Int!
  pointsAwarded: BigInt! # Total points awarded from QuestCompleted events
  totalTokensAwarded: BigInt!
  
  # Relations
  completions: [QuestCompletion!] @derivedFrom(field: "quest")
  
  # Metadata
  txHash: String! @index
}

type QuestCompletion @entity {
  id: ID! # txHash-logIndex
  quest: Quest!
  user: User!
  
  # Rewards received
  pointsAwarded: BigInt!
  tokenReward: BigInt # ERC20 reward amount (if applicable)
  rewardToken: String # ERC20 token address (if applicable)
  
  # User context
  fid: BigInt! # Farcaster ID
  
  # Metadata
  timestamp: DateTime!
  blockNumber: Int! @index
  txHash: String! @index
}

# Phase 8.2: Points & Treasury System
type PointsTransaction @entity {
  id: ID! # txHash-logIndex
  transactionType: String! @index # "DEPOSIT", "WITHDRAW"
  user: String! @index # wallet address
  amount: BigInt!
  
  # Context
  from: String # source address (for deposits)
  to: String # destination address (for withdrawals)
  
  # Metadata
  timestamp: DateTime!
  blockNumber: Int! @index
  txHash: String! @index
}

type TreasuryOperation @entity {
  id: ID! # txHash-logIndex
  operationType: String! @index # "ESCROW_DEPOSIT", "PAYOUT", "REFUND"
  token: String! @index # ERC20 token address
  amount: BigInt!
  
  # Participants
  from: String! @index # depositor/payer
  to: String # recipient (for payouts/refunds)
  questId: BigInt # associated quest (if applicable)
  
  # Metadata
  timestamp: DateTime!
  blockNumber: Int! @index
  txHash: String! @index
}

# Phase 8.3: Badge Staking System
type BadgeStake @entity {
  id: ID! # txHash-logIndex (for stake/unstake events)
  user: String! @index # wallet address
  badgeId: BigInt! # NFT token ID
  stakeType: String! @index # "STAKED", "UNSTAKED"
  
  # Staking details
  stakedAt: DateTime # when staked (null if unstaked)
  unstakedAt: DateTime # when unstaked (null if still staked)
  isActive: Boolean! @index # true if currently staked
  
  # Rewards tracking
  rewardsEarned: BigInt # accumulated rewards while staked
  lastRewardClaim: DateTime # last time rewards were calculated
  
  # Power badge info (if applicable)
  isPowerBadge: Boolean! # true if this badge grants power
  powerMultiplier: Int # bonus multiplier (1-100)
  
  # Metadata
  blockNumber: Int! @index
  txHash: String! @index
}

# Phase 8.3.1: Power Badge Tracking
type PowerBadge @entity {
  id: ID! # fid (Farcaster ID)
  fid: BigInt! @index
  isPowerBadge: Boolean! # power status
  setBy: String! # admin who set this
  
  # Metadata
  timestamp: DateTime!
  blockNumber: Int! @index
  txHash: String! @index
}

# ============================================================================
# Phase 3.2G: ScoringModule Events (Jan 1, 2026)
# Contract: 0xdeCFDc900DD1DBD6f947d3558143aA8374413Bd6 (deployed block 40193345)
# ============================================================================

# StatsUpdated Event (emitted whenever user stats change)
# Source: event StatsUpdated(address indexed user, uint256 totalScore, uint256 level, uint8 rankTier, uint16 multiplier)
# Trigger: GM completion, quest completion, guild deposit, referral reward, manual point adjustment
type StatsUpdatedEvent @entity {
  id: ID! # txHash-logIndex
  user: User!
  
  # Snapshot data (from event params)
  totalScore: BigInt! # Total score at time of update
  level: Int! # Level at time of update (uint256 from contract)
  rankTier: Int! # Rank tier at time of update (uint8: 0-11)
  multiplier: Int! # Bonus multiplier at time of update (uint16: 100-500)
  
  # Context (for analytics)
  triggerType: String! @index # "GM", "QUEST", "GUILD", "REFERRAL", "MANUAL"
  triggerAmount: BigInt! # Points added in this transaction
  
  # Metadata
  timestamp: DateTime!
  blockNumber: Int! @index
  txHash: String! @index
}

# LevelUp Event (emitted when user levels up)
# Source: event LevelUp(address indexed user, uint256 oldLevel, uint256 newLevel, uint256 totalScore)
# Trigger: Automatic when totalScore crosses level thresholds
type LevelUpEvent @entity {
  id: ID! # txHash-logIndex
  user: User!
  
  # Level progression
  oldLevel: Int! # Previous level
  newLevel: Int! # New level after level up
  totalScore: BigInt! # Total score at time of level up
  
  # Computed analytics
  levelGap: Int! # newLevel - oldLevel (usually 1, but could be >1 for large score increases)
  
  # Metadata
  timestamp: DateTime!
  blockNumber: Int! @index
  txHash: String! @index
}

# RankUp Event (emitted when user ranks up to new tier)
# Source: event RankUp(address indexed user, uint8 oldTier, uint8 newTier, uint256 totalScore)
# Trigger: Automatic when totalScore crosses tier thresholds
# Tiers: 0=Cadet, 1=Pilot, 2=Captain, 3=Commander, 4=Star Admiral, 
#        5=Galaxy Marshal, 6=Cosmic Ace, 7=Nebula Lord, 8=Stellar Emperor,
#        9=Void Sovereign, 10=Astral Titan, 11=Cosmic Legend
type RankUpEvent @entity {
  id: ID! # txHash-logIndex
  user: User!
  
  # Rank progression
  oldTier: Int! # Previous tier (uint8: 0-11)
  newTier: Int! # New tier after rank up (uint8: 0-11)
  totalScore: BigInt! # Total score at time of rank up
  
  # Computed analytics
  tierGap: Int! # newTier - oldTier (usually 1, but could be >1 for large score increases)
  newMultiplier: Int! # New bonus multiplier unlocked (100-500)
  
  # Metadata
  timestamp: DateTime!
  blockNumber: Int! @index
  txHash: String! @index
}

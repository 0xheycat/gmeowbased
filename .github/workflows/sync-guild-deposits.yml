name: Guild Deposits Sync (Every 15 Minutes)

on:
  schedule:
    # Run every 15 minutes (blockchain events sync)
    # Pattern: */15 * * * * (every 15 min)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-guild-deposits:
    runs-on: ubuntu-latest
    timeout-minutes: 5 # Faster than member stats (only GraphQL query + inserts)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Sync blockchain guild deposits
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOYMENT_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL || 'https://gmeowhq.art' }}
        run: |
          echo "💰 Starting guild deposits sync (Subsquid → Supabase)..."
          
          # Call cron API endpoint
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$DEPLOYMENT_URL/api/cron/sync-guild-deposits")
          
          # Extract HTTP status code (last line)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          echo "📊 Response status: $http_code"
          echo "📄 Response body: $body"
          
          # Check if request was successful (HTTP 200 + success: true)
          if [ "$http_code" -eq 200 ]; then
            # Validate JSON success field
            if command -v jq &> /dev/null; then
              success_field=$(echo "$body" | jq -r '.success // false')
              
              if [ "$success_field" = "true" ]; then
                echo "✅ Guild deposits synced successfully!"
                
                # Parse and display results
                echo "📈 Sync summary:"
                echo "  Inserted: $(echo "$body" | jq -r '.inserted')"
                echo "  Skipped (duplicates): $(echo "$body" | jq -r '.skipped')"
                echo "  Errors: $(echo "$body" | jq -r '.errors')"
                echo "  Total processed: $(echo "$body" | jq -r '.totalProcessed')"
                echo "  Last block: $(echo "$body" | jq -r '.lastSyncedBlock')"
                echo "⏱️  Duration: $(echo "$body" | jq -r '.durationMs')ms"
              else
                echo "❌ Sync returned HTTP 200 but success=false"
                echo "Error: $(echo "$body" | jq -r '.error // "Unknown error"')"
                echo "Response: $body"
                exit 1
              fi
            else
              # Fallback if jq not available (shouldn't happen)
              echo "⚠️  jq not available, only checking HTTP status"
              echo "✅ Sync completed (HTTP $http_code)"
            fi
          else
            echo "❌ Sync failed with status $http_code"
            echo "Response: $body"
            exit 1
          fi
          
      - name: Notify on failure
        if: failure()
        run: |
          echo "🚨 Guild deposits sync FAILED!"
          echo "Check the logs above for details."
          echo "This means blockchain deposits are NOT showing in activity feed."

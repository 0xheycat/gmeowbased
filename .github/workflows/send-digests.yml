name: Send Notification Digests

# Phase 2 P6: Notification Batching - Send daily digests at 8 AM UTC
# Processes queued notifications from notification_batch_queue table
# Respects user timezone preferences and quiet hours (10pm-8am local time)

on:
  schedule:
    # 8 AM UTC daily (optimal time for global digest delivery)
    - cron: '0 8 * * *'
  
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (test without sending)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  send-digests:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Send notification digests
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
        run: |
          echo "📬 Sending notification digests..."
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          
          # Call cron endpoint
          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$NEXT_PUBLIC_BASE_URL/api/cron/send-digests")
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          # Check response
          if [ "$http_code" -ne 200 ]; then
            echo "❌ Error: HTTP $http_code"
            echo "$body"
            exit 1
          fi
          
          echo "✅ Success: HTTP $http_code"
          echo "$body" | jq -r '.processed // 0 | "Processed: \(.)"'
          echo "$body" | jq -r '.successful // 0 | "Successful: \(.)"'
          echo "$body" | jq -r '.failed // 0 | "Failed: \(.)"'

      - name: Summary
        if: always()
        run: |
          echo "✅ Digest delivery job completed"
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Schedule: Daily at 8 AM UTC"
          echo "Phase: Phase 2 P6 - Notification Batching"

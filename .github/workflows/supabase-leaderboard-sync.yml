name: Supabase Leaderboard Sync

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Supabase leaderboard snapshot (Base only)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          # Table/view names are configuration, not sensitive - use vars
          SUPABASE_LEADERBOARD_TABLE: ${{ vars.SUPABASE_LEADERBOARD_TABLE || 'leaderboard_snapshots' }}
          SUPABASE_LEADERBOARD_VIEW_CURRENT: ${{ vars.SUPABASE_LEADERBOARD_VIEW_CURRENT || 'leaderboard_current' }}
          SUPABASE_LEADERBOARD_SEASON_KEY: ${{ vars.SUPABASE_LEADERBOARD_SEASON_KEY || 'all' }}
          SUPABASE_TIMEOUT_MS: ${{ vars.SUPABASE_TIMEOUT_MS || '10000' }}
          SUPABASE_MAX_RETRIES: ${{ vars.SUPABASE_MAX_RETRIES || '3' }}
          # Base mainnet only (redeployed Nov 28, 2025)
          RPC_BASE: ${{ secrets.RPC_BASE }}
          CHAIN_START_BLOCK_BASE: ${{ vars.CHAIN_START_BLOCK_BASE || '37445375' }}
        run: npx tsx scripts/leaderboard/sync-supabase.ts

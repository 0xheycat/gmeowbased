name: Supabase Leaderboard Sync

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync Supabase leaderboard snapshot (Base only)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOYMENT_URL: ${{ secrets.VERCEL_URL || 'https://gmeowhq.art' }}
        run: |
          echo "📸 Starting leaderboard snapshot sync via API..."
          
          # Call secure API endpoint
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$DEPLOYMENT_URL/api/cron/sync-leaderboard")
          
          # Extract HTTP status code (last line)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          echo "📊 Response status: $http_code"
          echo "📄 Response body: $body"
          
          # Check if request was successful
          if [ "$http_code" -eq 200 ]; then
            echo "✅ Leaderboard snapshot sync completed successfully!"
            
            # Parse and display results (if jq is available)
            if command -v jq &> /dev/null; then
              echo "📈 Sync summary:"
              echo "$body" | jq -r '.result // "No detailed results available"'
            fi
          else
            echo "❌ Leaderboard snapshot sync failed with status $http_code"
            echo "$body"
            exit 1
          fi
          
          echo "⏱️ Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "📅 Schedule: Daily at midnight UTC"

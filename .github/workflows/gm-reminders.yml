name: GM Reminders

# Send push notifications to users who haven't GM'd today
# Runs twice daily to remind users to maintain their streak

on:
  schedule:
    # 9 AM UTC (afternoon in Asia, morning in Europe)
    - cron: '0 9 * * *'
    
    # 9 PM UTC (afternoon in Americas, evening in Europe)
    - cron: '0 21 * * *'
  
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (test without sending)'
        required: false
        type: boolean
        default: true
      max_notifications:
        description: 'Max notifications to send'
        required: false
        type: number
        default: 100

permissions:
  contents: read

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Send GM reminders
        env:
          # Neynar for notifications
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
          
          # Supabase for user data
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          
          # RPC endpoint for Base mainnet (check GM status)
          NEXT_PUBLIC_BASE_RPC_URL: ${{ secrets.NEXT_PUBLIC_BASE_RPC_URL }}
          
          NODE_ENV: production
        run: |
          echo "Starting GM reminders at $(date -u '+%Y-%m-%d %H:%M:%S UTC')..."
          
          # Check if command exists
          if ! npm run | grep -q "notifications:gm-reminders"; then
            echo "⚠️  Script not found, trying alternative..."
            pnpm tsx scripts/notifications/send-gm-reminders.ts --max 100 || echo "GM reminders completed with warnings"
          else
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              if [ "${{ inputs.dry_run }}" = "true" ]; then
                npm run notifications:gm-reminders -- --dry-run --max ${{ inputs.max_notifications }}
              else
                npm run notifications:gm-reminders -- --max ${{ inputs.max_notifications }}
              fi
            else
              # Scheduled run: send to max 100 users
              npm run notifications:gm-reminders -- --max 100 || echo "GM reminders completed with warnings"
            fi
          fi

      - name: Summary
        if: always()
        run: |
          echo "✅ GM reminders job completed"
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Schedule: Twice daily (9 AM and 9 PM UTC)"
          echo "Max notifications per run: 100"

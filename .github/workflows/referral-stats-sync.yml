name: Referral Stats Sync (Daily)

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-referral-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Sync referral statistics
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOYMENT_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL || 'https://gmeowhq.art' }}
        run: |
          echo "🔗 Starting referral stats sync..."
          
          # Call cron API endpoint
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$DEPLOYMENT_URL/api/cron/sync-referrals")
          
          # Extract HTTP status code (last line)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          echo "📊 Response status: $http_code"
          echo "📄 Response body: $body"
          
          # Check if request was successful
          if [ "$http_code" -eq 200 ]; then
            echo "✅ Referral stats synced successfully!"
            
            # Parse and display results (if jq is available)
            if command -v jq &> /dev/null; then
              echo "📈 Sync summary:"
              echo "  Total referrers: $(echo "$body" | jq -r '.stats.total_referrers')"
              echo "  Updated: $(echo "$body" | jq -r '.stats.updated')"
              echo "  Failed: $(echo "$body" | jq -r '.stats.failed')"
              echo "  Total referrals: $(echo "$body" | jq -r '.stats.total_referrals')"
              echo "  Successful referrals: $(echo "$body" | jq -r '.stats.successful_referrals')"
              echo "  Avg conversion rate: $(echo "$body" | jq -r '.stats.avg_conversion_rate')"
              echo ""
              echo "🏆 Tier distribution:"
              echo "  Gold: $(echo "$body" | jq -r '.stats.tier_distribution.gold')"
              echo "  Silver: $(echo "$body" | jq -r '.stats.tier_distribution.silver')"
              echo "  Bronze: $(echo "$body" | jq -r '.stats.tier_distribution.bronze')"
              echo "  None: $(echo "$body" | jq -r '.stats.tier_distribution.none')"
              echo ""
              echo "⏱️  Duration: $(echo "$body" | jq -r '.duration')"
            fi
          else
            echo "❌ Referral stats sync failed with status $http_code"
            echo "$body"
            exit 1
          fi
      
      - name: Report failure
        if: failure()
        run: |
          echo "⚠️  Referral stats sync failed. Check the logs above for details."
          echo "This may require manual intervention."

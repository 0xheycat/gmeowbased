name: Leaderboard Update (Every 6 Hours)

on:
  schedule:
    # Run every 6 hours (0:00, 6:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Update leaderboard calculations
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOYMENT_URL: ${{ secrets.VERCEL_URL || 'https://gmeowbased.vercel.app' }}
        run: |
          echo "🏆 Starting leaderboard update..."
          
          # Call cron API endpoint
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$DEPLOYMENT_URL/api/cron/update-leaderboard")
          
          # Extract HTTP status code (last line)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          echo "📊 Response status: $http_code"
          echo "📄 Response body: $body"
          
          # Check if request was successful
          if [ "$http_code" -eq 200 ]; then
            echo "✅ Leaderboard updated successfully!"
            
            # Parse and display results (if jq is available)
            if command -v jq &> /dev/null; then
              echo "📈 Update summary:"
              echo "$body" | jq -r '.periods | to_entries[] | "  \(.key): \(.value.updated) entries updated"'
              echo "⏱️ Duration: $(echo "$body" | jq -r '.duration')"
            fi
          else
            echo "❌ Leaderboard update failed with status $http_code"
            echo "$body"
            exit 1
          fi
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Leaderboard update failed. Check logs for details."
          # Add Slack/Discord notification here if needed

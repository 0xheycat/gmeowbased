name: Viral Metrics Sync (Base)

on:
  schedule:
    # Run every 6 hours to update engagement metrics
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync viral metrics from Neynar
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOYMENT_URL: ${{ secrets.VERCEL_URL || 'https://gmeowhq.art' }}
        run: |
          echo "📊 Starting viral metrics sync via API..."
          
          # Call secure API endpoint
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$DEPLOYMENT_URL/api/cron/sync-viral-metrics")
          
          # Extract HTTP status code (last line)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          echo "📊 Response status: $http_code"
          echo "📄 Response body: $body"
          
          # Check if request was successful
          if [ "$http_code" -eq 200 ]; then
            echo "✅ Viral metrics sync completed successfully!"
            
            # Parse and display results (if jq is available)
            if command -v jq &> /dev/null; then
              echo "📈 Sync summary:"
              echo "$body" | jq -r '.result // "No detailed results available"'
            fi
          else
            echo "❌ Viral metrics sync failed with status $http_code"
            echo "$body"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "⏱️ Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "📅 Schedule: Every 6 hours"
          echo "Check logs for tier upgrades and XP awards"

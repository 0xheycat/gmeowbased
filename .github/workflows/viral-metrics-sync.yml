name: Viral Metrics Sync (Base)

on:
  schedule:
    # Run every 6 hours to update engagement metrics
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync viral metrics from Neynar
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
        run: npx tsx scripts/automation/sync-viral-metrics.ts

      - name: Report results
        if: always()
        run: |
          echo "Viral metrics sync completed"
          echo "Check logs for tier upgrades and XP awards"

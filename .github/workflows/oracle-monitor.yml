name: Oracle Balance Monitor

# Run every 5 minutes
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run oracle balance monitor
        env:
          NEXT_PUBLIC_GM_BASE_CORE: ${{ secrets.NEXT_PUBLIC_GM_BASE_CORE }}
          NEXT_PUBLIC_RPC_BASE: ${{ secrets.NEXT_PUBLIC_RPC_BASE }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run oracle:monitor
      
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-monitor-logs
          path: |
            *.log
          retention-days: 7

name: Cron Jobs (All) - Optimized for Free Tier

# Consolidated cron jobs running via GitHub Actions (not Vercel)
# This prevents Vercel CPU usage and "Fluid Active CPU" pauses

on:
  schedule:
    # Hourly jobs
    - cron: '0 * * * *'   # Guild stats sync
    - cron: '30 * * * *'  # Leaderboard update
    
    # Every 6 hours
    - cron: '0 */6 * * *'  # Guild member stats, deposits, level-ups
    
    # Daily jobs
    - cron: '0 1 * * *'   # Badge minting (1 AM UTC)
    - cron: '0 2 * * *'   # Expire quests (2 AM UTC)
    - cron: '0 3 * * *'   # Referral stats (3 AM UTC)
    - cron: '0 4 * * *'   # Viral metrics (4 AM UTC)
    - cron: '0 5 * * *'   # Send digests (5 AM UTC)
  
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: true
        type: choice
        options:
          - sync-guilds
          - sync-guild-members
          - sync-guild-deposits
          - sync-guild-leaderboard
          - sync-guild-level-ups
          - mint-badges
          - update-leaderboard
          - sync-referrals
          - sync-viral-metrics
          - expire-quests
          - send-digests

jobs:
  run-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: true
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Determine job to run
        id: job
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "job=${{ inputs.job }}" >> $GITHUB_OUTPUT
          else
            # Determine job based on schedule
            hour=$(date -u +%H)
            if [ "$hour" = "01" ]; then
              echo "job=mint-badges" >> $GITHUB_OUTPUT
            elif [ "$hour" = "02" ]; then
              echo "job=expire-quests" >> $GITHUB_OUTPUT
            elif [ "$hour" = "03" ]; then
              echo "job=sync-referrals" >> $GITHUB_OUTPUT
            elif [ "$hour" = "04" ]; then
              echo "job=sync-viral-metrics" >> $GITHUB_OUTPUT
            elif [ "$hour" = "05" ]; then
              echo "job=send-digests" >> $GITHUB_OUTPUT
            elif [ $(($hour % 6)) = "0" ]; then
              echo "job=sync-guild-members" >> $GITHUB_OUTPUT
            elif [ $(($hour % 2)) = "0" ]; then
              echo "job=sync-guilds" >> $GITHUB_OUTPUT
            else
              echo "job=update-leaderboard" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: Run cron job
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
          RPC_BASE: ${{ secrets.RPC_BASE }}
        run: |
          echo "🚀 Running job: ${{ steps.job.outputs.job }}"
          echo "⚡ Execution: GitHub Actions (zero Vercel CPU usage)"
          pnpm tsx scripts/cron-runner.ts ${{ steps.job.outputs.job }}
      
      - name: Report success
        if: success()
        run: echo "✅ Cron job completed successfully"
      
      - name: Report failure
        if: failure()
        run: |
          echo "❌ Cron job failed"
          exit 1

name: Guild-Leaderboard Sync (Every 6 Hours)

on:
  schedule:
    # Run every 6 hours (0:30, 6:30, 12:30, 18:30 UTC)
    # Offset by 30 minutes from guild-stats-sync to prevent conflicts
    - cron: '30 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-guild-leaderboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Sync guild membership to leaderboard
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOYMENT_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL || 'https://gmeowhq.art' }}
        run: |
          echo "🏆 Starting guild-leaderboard sync..."
          echo "📡 Target: $DEPLOYMENT_URL/api/cron/sync-guild-leaderboard"
          
          # Call cron API endpoint
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$DEPLOYMENT_URL/api/cron/sync-guild-leaderboard")
          
          # Extract HTTP status code (last line)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          echo "📊 Response status: $http_code"
          echo "📄 Response body: $body"
          
          # Check if request was successful
          if [ "$http_code" -eq 200 ]; then
            echo "✅ Guild-leaderboard sync completed successfully!"
            
            # Parse response JSON to display sync stats
            synced=$(echo "$body" | grep -o '"synced":[0-9]*' | cut -d':' -f2)
            errors=$(echo "$body" | grep -o '"errors":[0-9]*' | cut -d':' -f2)
            duration=$(echo "$body" | grep -o '"duration":"[^"]*"' | cut -d'"' -f4)
            
            echo "📈 Synced: $synced entries"
            echo "⚠️ Errors: $errors"
            echo "⏱️ Duration: $duration"
            
            exit 0
          else
            echo "❌ Guild-leaderboard sync failed with status $http_code"
            echo "💥 Error details: $body"
            exit 1
          fi
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "🚨 Guild-leaderboard sync failed - check logs above for details"

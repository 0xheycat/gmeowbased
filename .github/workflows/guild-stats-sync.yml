name: Guild Stats Sync (Every 6 Hours)

on:
  schedule:
    # Run every 6 hours (0:00, 6:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-guild-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Sync guild statistics
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOYMENT_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL || 'https://gmeowhq.art' }}
        run: |
          echo "🏰 Starting guild stats sync..."
          
          # Call cron API endpoint
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$DEPLOYMENT_URL/api/cron/sync-guilds")
          
          # Extract HTTP status code (last line)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          echo "📊 Response status: $http_code"
          echo "📄 Response body: $body"
          
          # Check if request was successful
          if [ "$http_code" -eq 200 ]; then
            echo "✅ Guild stats synced successfully!"
            
            # Parse and display results (if jq is available)
            if command -v jq &> /dev/null; then
              echo "📈 Sync summary:"
              echo "  Total guilds: $(echo "$body" | jq -r '.stats.total_guilds')"
              echo "  Updated: $(echo "$body" | jq -r '.stats.updated')"
              echo "  Failed: $(echo "$body" | jq -r '.stats.failed')"
              echo "⏱️  Duration: $(echo "$body" | jq -r '.duration')"
            fi
          else
            echo "❌ Guild stats sync failed with status $http_code"
            echo "$body"
            exit 1
          fi
      
      - name: Report failure
        if: failure()
        run: |
          echo "⚠️  Guild stats sync failed. Check the logs above for details."
          echo "This may require manual intervention."

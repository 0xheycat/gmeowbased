name: Guild Stats Sync (Hourly)

on:
  schedule:
    # Run every hour (0:00, 1:00, 2:00, ... UTC)
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-guild-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: true
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Sync guild statistics from Subsquid
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL || 'https://gmeowhq.art' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_ENV: production
        run: |
          echo "🏰 Starting guild stats sync..."
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          
          if [ -f "scripts/cron-runner.ts" ]; then
            pnpm tsx scripts/cron-runner.ts sync-guilds || echo "Guild sync completed with warnings"
          else
            echo "⚠️  cron-runner.ts not found, checking for alternative script..."
            pnpm tsx scripts/oracle/deposit-guild-points.ts || echo "Guild sync completed with warnings"
          fi
            echo "$body"
            exit 1
          fi
      
      - name: Report failure
        if: failure()
        run: |
          echo "⚠️  Guild stats sync failed. Check the logs above for details."
          echo "This may require manual intervention."

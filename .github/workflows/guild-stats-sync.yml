name: Guild Stats Sync (Hourly)

on:
  schedule:
    # Run every hour (0:00, 1:00, 2:00, ... UTC)
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-guild-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Sync guild statistics from Subsquid
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL || 'https://gmeowhq.art' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🏰 Starting guild stats sync (standalone - no Vercel API)"
          echo "📊 Architecture: Direct execution → Subsquid → Supabase"
          
          # Run standalone script (no Vercel CPU usage)
          pnpm tsx scripts/cron-runner.ts sync-guilds
          response="$?"
          
          # Check exit code
          if [ "$response" -eq 0 ]; then
            echo "✅ Guild stats synced successfully!"
            
            # Parse and display results (if jq is available)
            if command -v jq &> /dev/null; then
              echo "📈 Sync summary:"
              echo "  Total guilds: $(echo "$body" | jq -r '.stats.total // .stats.total_guilds')"
              echo "  Synced: $(echo "$body" | jq -r '.stats.synced // .stats.updated')"
              echo "  Failed: $(echo "$body" | jq -r '.stats.failed')"
              echo "⏱️  Duration: $(echo "$body" | jq -r '.duration')"
              echo "🎯 Cache hit rate target: 95%+ (once populated)"
            fi
          else
            echo "❌ Guild stats sync failed with status $http_code"
            echo "$body"
            exit 1
          fi
      
      - name: Report failure
        if: failure()
        run: |
          echo "⚠️  Guild stats sync failed. Check the logs above for details."
          echo "This may require manual intervention."

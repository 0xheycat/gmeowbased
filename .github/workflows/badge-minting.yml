name: Badge Minting (Base)

# Automated badge minting from queue
# Base mainnet only (redeployed Nov 28, 2025)
# Runs daily to process pending badge mints

on:
  schedule:
    # Daily at 1 AM UTC (after leaderboard sync at midnight)
    - cron: '0 1 * * *'
  
  # Manual trigger for testing
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mint-badges:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process badge minting queue
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOYMENT_URL: ${{ secrets.VERCEL_URL || 'https://gmeowhq.art' }}
        run: |
          echo "🎖️ Starting badge minting via API..."
          
          # Call secure API endpoint
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$DEPLOYMENT_URL/api/cron/mint-badges")
          
          # Extract HTTP status code (last line)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          echo "📊 Response status: $http_code"
          echo "📄 Response body: $body"
          
          # Check if request was successful
          if [ "$http_code" -eq 200 ]; then
            echo "✅ Badge minting completed successfully!"
            
            # Parse and display results (if jq is available)
            if command -v jq &> /dev/null; then
              echo "🎖️ Minting summary:"
              echo "$body" | jq -r '.result // "No detailed results available"'
            fi
          else
            echo "❌ Badge minting failed with status $http_code"
            echo "$body"
            exit 1
          fi
          
          echo "⏱️ Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "📅 Schedule: Daily at 1 AM UTC"

name: Quest Escrow Refund Automation

# Run daily at 2 AM UTC (low traffic time)
on:
  schedule:
    - cron: '0 2 * * *'
  
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (no actual refunds)'
        required: false
        type: boolean
        default: true
      max_refunds:
        description: 'Maximum refunds per run'
        required: false
        type: number
        default: 50

jobs:
  refund-expired-quests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run escrow refund automation
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Running in DRY RUN mode (manual trigger)"
            npx tsx scripts/automation/refund-expired-quests.ts --dry-run --max=${{ inputs.max_refunds || 50 }}
          else
            echo "Running in LIVE mode (scheduled cron)"
            npx tsx scripts/automation/refund-expired-quests.ts --max=50
          fi

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Quest Escrow Refund Automation Failed',
              body: `The automated escrow refund job failed at ${new Date().toISOString()}.
              
              **Workflow Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
              
              Please investigate the logs and ensure:
              - Supabase secrets are configured correctly
              - Database connection is working
              - No schema changes broke the refund logic
              
              Manual intervention may be required to refund stuck escrow.`,
              labels: ['bug', 'automation', 'quest-system']
            })
